# Déploiement Render (Blueprint). Connecte ton dépôt : Render lit ce fichier.
services:
  - type: web
    name: kaddu
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 180
    envVars:
      - key: APP_SECRET
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.11.9"
